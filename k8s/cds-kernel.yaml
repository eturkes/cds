# Rust kernel Deployment + Service (Phase 1 cloud foundation, Task
# 11.1). Same shape as cds-harness; `dapr.io/app-id: cds-kernel`
# parity with the Phase 0 self-hosted recipe. Image tag
# `cds-kernel:dev` is built + loaded into kind at Task 11.2. Resource
# requests skew slightly higher than the harness because the kernel
# spawns Z3 / cvc5 / Lean subprocesses (ADR-004 warden) on every
# `/v1/{solve,recheck}` call — ADR-028 §"Resource sizing" justifies
# the 512Mi / 250m floor.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cds-kernel
  namespace: cds
  labels:
    app: cds-kernel
    app.kubernetes.io/name: cds-kernel
    app.kubernetes.io/part-of: cds
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cds-kernel
  template:
    metadata:
      labels:
        app: cds-kernel
        app.kubernetes.io/name: cds-kernel
        app.kubernetes.io/part-of: cds
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "cds-kernel"
        dapr.io/app-port: "8082"
        dapr.io/app-protocol: "http"
        dapr.io/config: "cds-config"
        dapr.io/log-level: "info"
        dapr.io/sidecar-memory-limit: "256Mi"
        dapr.io/sidecar-cpu-limit: "500m"
    spec:
      containers:
        - name: cds-kernel
          image: cds-kernel:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
          env:
            - name: CDS_KERNEL_HOST
              value: "0.0.0.0"
            - name: CDS_KERNEL_PORT
              value: "8082"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: cds-kernel
  namespace: cds
  labels:
    app: cds-kernel
    app.kubernetes.io/name: cds-kernel
    app.kubernetes.io/part-of: cds
spec:
  type: ClusterIP
  selector:
    app: cds-kernel
  ports:
    - name: http
      port: 8082
      targetPort: http
      protocol: TCP
